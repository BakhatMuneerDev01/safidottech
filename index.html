<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAFI DOT TECH — Premium Digital Solutions</title>
    <meta name="description" content="SAFI DOT TECH — Premium digital products and development services." />

    <!--
      FONT PRELOAD STRATEGY
      ─────────────────────
      Fetches font files before CSS is parsed, eliminating
      any render-blocking delay on first paint.

      Priority order (above-the-fold first):
        1. ClashDisplay-Medium   → h1 / hero heading
        2. Satoshi-Regular       → body copy
        3. ClashDisplay-Bold     → CTAs, hero
        4. Remaining weights     → secondary load

      type="font/otf" is the correct MIME type for OpenType files.
      crossorigin is required even for same-origin font fetches.
    -->

    <!-- Clash Display (critical weights first) -->
    <link rel="preload" href="/fonts/ClashDisplay-Medium.otf"   as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/ClashDisplay-Bold.otf"     as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/ClashDisplay-Semibold.otf" as="font" type="font/otf" crossorigin />

    <!-- Satoshi (body text — critical path) -->
    <link rel="preload" href="/fonts/Satoshi-Regular.otf" as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Medium.otf"  as="font" type="font/otf" crossorigin />
    <link rel="preload" href="/fonts/Satoshi-Bold.otf"    as="font" type="font/otf" crossorigin />

    <!-- JetBrains Mono (non-critical — preload only) -->
    <link rel="preload" href="/fonts/JetBrainsMono-Regular.otf" as="font" type="font/otf" crossorigin />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
